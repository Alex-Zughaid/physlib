name: Reviewer load report

on:
  schedule:
    # Runs daily at this time
    - cron: "0 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  pull-requests: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Send reviewer report to Zulip
        env:
          # These GitHub tokens are already configured
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}

          # Number of days in the past to check
          WINDOW_DAYS: "30"
          BUSY_THRESHOLD: "3"
          # Optional: comma-separated usernames to force the roster instead
          # of auto-deriving it. Uncomment and set as a repo variable if you
          # want a fixed reviewer list.
          # REVIEWERS_LIST: ${{ vars.REVIEWERS_LIST }}

          # These Zulip secrets are configured in the repo settings
          # (Physlib -> Settings -> Secrets and variables -> Actions)
          ZULIP_SITE: ${{ secrets.ZULIP_SITE }}
          ZULIP_BOT_EMAIL: ${{ secrets.ZULIP_BOT_EMAIL }}
          ZULIP_BOT_API_KEY: ${{ secrets.ZULIP_BOT_API_KEY }}
          ZULIP_STREAM: ${{ secrets.ZULIP_STREAM }}
          ZULIP_TOPIC: "Reviewer load report"
        run: python3 scripts/repo-updates-script.py
